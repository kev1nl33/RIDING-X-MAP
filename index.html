<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高德地图咖啡馆搜索</title>
  <style>
    html, body, #root {
      height: 100%;
      margin: 0;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/react@17/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@17/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script src="https://webapi.amap.com/loader.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useRef } = React;

    function MapPage() {
      const mapRef = useRef(null);

      useEffect(() => {
        AMapLoader.load({
          key: 'YOUR_AMAP_KEY',
          version: '2.0',
          plugins: ['AMap.Geolocation', 'AMap.PlaceSearch', 'AMap.InfoWindow']
        }).then(AMap => {
          const map = new AMap.Map(mapRef.current, { zoom: 14 });

          map.plugin('AMap.Geolocation', () => {
            const geolocation = new AMap.Geolocation({
              enableHighAccuracy: true,
              timeout: 10000,
            });
            map.addControl(geolocation);
            geolocation.getCurrentPosition((status, result) => {
              if (status === 'complete') {
                const { position } = result;
                map.setCenter(position);
                searchNearby(position);
              } else {
                console.error('定位失败', result);
              }
            });
          });

          const searchNearby = center => {
            map.plugin('AMap.PlaceSearch', () => {
              const placeSearch = new AMap.PlaceSearch({
                pageSize: 20,
                pageIndex: 1,
              });
              placeSearch.searchNearBy('咖啡馆', center, 10000, (status, res) => {
                if (status !== 'complete' || !res.poiList) return;
                res.poiList.pois.forEach(poi => {
                  const marker = new AMap.Marker({
                    position: poi.location,
                    map,
                  });
                  marker.on('click', () => {
                    const info = new AMap.InfoWindow({
                      content: `<div>
                                  <strong>${poi.name}</strong><br/>
                                  距离: ${poi.distance} 米<br/>
                                  评分: ${poi.biz_ext?.rating || '暂无'}
                                </div>`,
                      offset: new AMap.Pixel(0, -20),
                    });
                    info.open(map, marker.getPosition());
                  });
                });
              });
            });
          };
        }).catch(e => console.error(e));
      }, []);

      return <div ref={mapRef} style={{ width: '100%', height: '100%' }} />;
    }

    ReactDOM.render(<MapPage />, document.getElementById('root'));
  </script>
</body>
</html>
